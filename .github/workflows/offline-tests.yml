name: Offline tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-compatibility:
    name: python-compatibility (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile Python sources
        run: python -m compileall -q scripts skills tests
      - name: Run progressive static quality checks
        run: python scripts/static_quality.py
      - name: Run offline unit tests
        env:
          AUTO_G16_SKIP_PRESSURE_TESTS: "1"
        run: python scripts/run_tests.py --top-slow 15 --slow-threshold 1.0
      - name: Check shell syntax
        run: bash -n scripts/check_rtwin_connection.sh scripts/probe_gaussian_server.sh templates/g16_job.pbs.template

  source-archive-release:
    name: source-archive-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c
        with:
          python-version: "3.13"
      - name: Audit required-check declarations
        run: python scripts/audit_ci_contract.py
      - name: Test the GitHub source archive including pressure coverage
        run: |
          archive_dir="$(mktemp -d)"
          trap 'rm -rf "$archive_dir"' EXIT
          git archive HEAD | tar -x -C "$archive_dir"
          cd "$archive_dir"
          python scripts/run_tests.py --top-slow 20 --slow-threshold 1.0

  chemistry-dependencies:
    name: chemistry-dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements/chemistry.txt
            requirements/chemistry.lock.txt
      - name: Install optional chemistry dependencies
        run: python -m pip install --requirement requirements/chemistry.txt
      - name: Import and report optional chemistry dependencies
        run: python -c "import numpy, PIL, rdkit; print(f'numpy={numpy.__version__}'); print(f'Pillow={PIL.__version__}'); print(f'rdkit={rdkit.__version__}')"
      - name: Run real RDKit structure, conformer, and depiction smoke
        env:
          AUTO_G16_REQUIRE_RDKIT: "1"
        run: python -m unittest tests.test_rdkit_smoke -v
