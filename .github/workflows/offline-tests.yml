name: Offline tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unittest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile Python sources
        run: python -m compileall -q scripts skills tests
      - name: Run offline unit tests
        run: python -m unittest discover -s tests -v
      - name: Test the GitHub source archive
        run: |
          archive_dir="$(mktemp -d)"
          trap 'rm -rf "$archive_dir"' EXIT
          git archive HEAD | tar -x -C "$archive_dir"
          cd "$archive_dir"
          python -m unittest discover -s tests -v
      - name: Check shell syntax
        run: bash -n scripts/check_rtwin_connection.sh scripts/probe_gaussian_server.sh templates/g16_job.pbs.template

  chemistry-dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements/chemistry.txt
      - name: Install optional chemistry dependencies
        run: python -m pip install --requirement requirements/chemistry.txt
      - name: Import optional chemistry dependencies
        run: python -c "import numpy, PIL, rdkit"
